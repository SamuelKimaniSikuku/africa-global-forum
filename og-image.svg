<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Africa Global Forum — Where the diaspora helps the diaspora.">
  <title>Africa Global Forum — Where the diaspora helps the diaspora.</title>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0E0B08"/>

  <!-- Warm radial accents -->
  <defs>
    <radialGradient id="warmA" cx="0.9" cy="0.1" r="0.7">
      <stop offset="0%" stop-color="#D89B2C" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0E0B08" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warmB" cx="0.1" cy="0.95" r="0.7">
      <stop offset="0%" stop-color="#C8421A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0E0B08" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#warmA)"/>
  <rect width="1200" height="630" fill="url(#warmB)"/>

  <!-- Brand mark -->
  <g transform="translate(90, 90)">
    <circle cx="40" cy="40" r="40" fill="#F4EFE6"/>
    <circle cx="52" cy="32" r="13" fill="#D89B2C"/>
    <circle cx="40" cy="40" r="19" fill="#C8421A"/>
  </g>

  <!-- Eyebrow -->
  <text x="90" y="220" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="22" fill="#D89B2C" letter-spacing="6">AFRICA GLOBAL FORUM</text>

  <!-- Headline -->
  <text x="90" y="330" font-family="Georgia, 'Times New Roman', serif" font-size="84" font-weight="500" fill="#F4EFE6" letter-spacing="-2.5">Where the diaspora</text>
  <text x="90" y="430" font-family="Georgia, 'Times New Roman', serif" font-size="84" font-style="italic" font-weight="400" fill="#F4EFE6" letter-spacing="-2.5"><tspan fill="#D89B2C">helps</tspan> the diaspora.</text>

  <!-- Footer URL -->
  <text x="90" y="560" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="18" fill="rgba(244,239,230,0.55)" letter-spacing="4">AFRICAGLOBALFORUM.COM</text>

  <!-- Right-side accent disc -->
  <g transform="translate(960, 380)">
    <circle cx="0" cy="0" r="170" fill="#7A2E12"/>
    <circle cx="40" cy="-30" r="60" fill="#D89B2C"/>
    <circle cx="0" cy="0" r="85" fill="#C8421A"/>
  </g>
</svg>
